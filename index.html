<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Predictor Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <!-- ONLY LOGIN - Nothing else -->
    <div id="loginScreen">
        <div class="loginBox">
            <div class="logo">🎯</div>
            <h1>PREDICTOR PRO</h1>
            <p class="subtitle">WinGo Multi-Game Platform</p>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Enter Password" autocomplete="current-password">
            </div>
            <button onclick="login()"><i class="fas fa-sign-in-alt"></i> Login</button>
            <div id="loginMsg"></div>
            <div style="margin-top:15px;font-size:11px;color:#444;">
                <i class="fas fa-shield-alt"></i> Secure Login
            </div>
        </div>
    </div>

    <!-- Only login script -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ============================================
        // SUPABASE CONFIG - From Environment Variables
        // ============================================
        const SUPABASE_URL = "https://wxrycrqetmvvousdqjzg.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind4cnljcnFldG12dm91c2RxanpnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1OTIxNTgsImV4cCI6MjA5OTE2ODE1OH0.qs3QUrqLyBuNv7KbWBg8b8rlEgWSaKNMKdSxduMvr-Q";
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // ============================================
        // LOGIN FUNCTION
        // ============================================
        async function login() {
            const password = document.getElementById('password').value.trim();
            const loginMsg = document.getElementById('loginMsg');
            
            if (!password) {
                loginMsg.innerHTML = '⚠️ Please enter password';
                loginMsg.style.color = '#ffcc00';
                return;
            }

            loginMsg.innerHTML = '⏳ Authenticating...';
            loginMsg.style.color = '#ffcc00';

            try {
                const { data, error } = await supabase
                    .from('users')
                    .select('*')
                    .eq('password', password)
                    .maybeSingle();

                if (error || !data) {
                    loginMsg.innerHTML = '❌ Invalid password';
                    loginMsg.style.color = '#ff6b6b';
                    return;
                }

                loginMsg.innerHTML = '✅ Welcome! Redirecting...';
                loginMsg.style.color = '#69db7c';

                // Store session in localStorage
                localStorage.setItem('loggedIn', 'true');
                localStorage.setItem('username', data.username || 'User');
                
                // Redirect to dashboard after 500ms
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 500);

            } catch (err) {
                loginMsg.innerHTML = '❌ Connection error';
                loginMsg.style.color = '#ff6b6b';
            }
        }

        // Enter key support
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                login();
            }
        });
    </script>
</body>
</html>
