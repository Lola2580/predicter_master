<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinGo Predictor Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* ============================================
           COMPLETE STYLE
        ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: #0a0e17;
            color: #e0e0e0;
            min-height: 100vh;
        }

        /* ===== LOGIN ===== */
        #loginScreen {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(ellipse at center, #0a0a1a, #000000);
            position: relative;
        }

        #loginScreen::before {
            content: '';
            position: absolute;
            width: 300%;
            height: 300%;
            background: conic-gradient(from 0deg, transparent, rgba(0,255,255,0.03), transparent, rgba(255,0,255,0.03), transparent);
            animation: rotateBg 30s linear infinite;
        }

        @keyframes rotateBg {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loginBox {
            position: relative;
            z-index: 1;
            width: 380px;
            padding: 45px 40px;
            border-radius: 24px;
            background: rgba(16, 20, 30, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 255, 255, 0.15);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
        }

        .loginBox .logo {
            text-align: center;
            font-size: 48px;
            margin-bottom: 5px;
        }

        .loginBox h1 {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #00ffff, #0088ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
        }

        .loginBox .subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .loginBox .input-group {
            position: relative;
            margin-bottom: 16px;
        }

        .loginBox .input-group i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #555;
            font-size: 16px;
        }

        .loginBox input {
            width: 100%;
            padding: 14px 14px 14px 45px;
            border: 2px solid rgba(255,255,255,0.06);
            outline: none;
            border-radius: 14px;
            background: rgba(255,255,255,0.04);
            color: #fff;
            font-size: 15px;
            transition: all 0.3s;
        }

        .loginBox input:focus {
            border-color: #00ffff;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.08);
        }

        .loginBox input::placeholder {
            color: #555;
        }

        .loginBox button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-size: 17px;
            font-weight: 700;
            color: #000;
            background: linear-gradient(135deg, #00ffff, #0066ff);
            transition: all 0.3s;
            margin-top: 5px;
        }

        .loginBox button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 40px rgba(0, 255, 255, 0.3);
        }

        #loginMsg {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
            min-height: 24px;
            padding: 8px;
            border-radius: 10px;
        }

        /* ===== MAIN ===== */
        #mainPage {
            display: none;
            max-width: 1600px;
            margin: auto;
            padding: 15px 20px 25px;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .header .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header .brand i {
            font-size: 24px;
            color: #00ffff;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #00ffff, #0088ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header .right-section {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        #connectionStatus {
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #connectionStatus .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        #connectionStatus.online .dot { background: #00ff6c; box-shadow: 0 0 15px rgba(0,255,108,0.4); }
        #connectionStatus.offline .dot { background: #ff0040; box-shadow: 0 0 15px rgba(255,0,64,0.4); }

        .logout-btn {
            padding: 6px 18px;
            border: 1px solid rgba(255,0,64,0.2);
            border-radius: 30px;
            background: rgba(255,0,64,0.08);
            color: #ff6b6b;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: rgba(255,0,64,0.15);
        }

        /* ===== GAME CARDS ===== */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }

        .game-card {
            background: rgba(255,255,255,0.03);
            border: 2px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 16px;
            transition: all 0.3s;
        }

        .game-card:hover {
            border-color: rgba(0,255,255,0.15);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .game-card .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .game-card .game-name {
            font-size: 14px;
            font-weight: 700;
            color: #00ffff;
        }

        .game-card .game-status {
            font-size: 10px;
            padding: 3px 12px;
            border-radius: 30px;
            font-weight: 600;
        }

        .game-status.running {
            background: rgba(0,255,108,0.12);
            color: #69db7c;
            animation: pulseStatus 2s infinite;
        }

        .game-status.saving {
            background: rgba(255,215,0,0.12);
            color: #ffd700;
        }

        @keyframes pulseStatus {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .game-card .game-period {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
            font-family: monospace;
        }

        .game-card .game-numbers {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 8px 0;
        }

        .game-card .game-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 18px;
            font-weight: 700;
            border: 2px solid currentColor;
        }

        .game-card .game-number.num-0,
        .game-card .game-number.num-5 { color: #a855f7; background: rgba(168, 85, 247, 0.1); }
        .game-card .game-number.num-1,
        .game-card .game-number.num-3,
        .game-card .game-number.num-7,
        .game-card .game-number.num-9 { color: #22c55e; background: rgba(34, 197, 94, 0.1); }
        .game-card .game-number.num-2,
        .game-card .game-number.num-4,
        .game-card .game-number.num-6,
        .game-card .game-number.num-8 { color: #ef4444; background: rgba(239, 68, 68, 0.1); }

        .game-card .game-footer {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 11px;
            color: #666;
            padding-top: 8px;
            border-top: 1px solid rgba(255,255,255,0.04);
        }

        .game-card .game-footer .save-status {
            color: #69db7c;
        }

        .game-card .game-footer .save-status.saving {
            color: #ffd700;
        }

        .game-card .game-timer {
            font-size: 20px;
            font-weight: 700;
            text-align: center;
            color: #00ffff;
            padding: 5px 0;
        }

        .game-card .game-timer.warning {
            color: #ffd700;
        }

        .game-card .game-timer.danger {
            color: #ff6b6b;
            animation: pulseTimer 0.5s infinite;
        }

        @keyframes pulseTimer {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* ===== CONSOLE LOG ===== */
        .console-log {
            background: rgba(0,0,0,0.5);
            border-radius: 16px;
            padding: 16px;
            max-height: 250px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.8;
            border: 1px solid rgba(255,255,255,0.04);
            margin-top: 16px;
        }

        .console-log .log-entry {
            padding: 2px 0;
            border-bottom: 1px solid rgba(255,255,255,0.02);
            display: flex;
            gap: 10px;
        }

        .console-log .log-time {
            color: #666;
            min-width: 70px;
        }

        .console-log .log-game {
            min-width: 80px;
            font-weight: 600;
        }

        .console-log .log-game.wingo30 { color: #4fc3f7; }
        .console-log .log-game.wingo1 { color: #69db7c; }
        .console-log .log-game.wingo3 { color: #ffd700; }
        .console-log .log-game.wingo5 { color: #ff6b6b; }

        .console-log .log-success { color: #69db7c; }
        .console-log .log-info { color: #4fc3f7; }
        .console-log .log-warning { color: #ffd700; }
        .console-log .log-error { color: #ff6b6b; }

        /* ===== CONTROLS ===== */
        .controls-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            margin-top: 16px;
        }

        .toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 13px;
            color: #888;
            padding: 6px 14px;
            border-radius: 30px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            transition: all 0.3s;
        }

        .toggle:hover {
            background: rgba(255,255,255,0.06);
        }

        .toggle input {
            width: 16px;
            height: 16px;
            accent-color: #00ffff;
            cursor: pointer;
        }

        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00ffff, #0066ff);
            color: #000;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,255,255,0.2);
        }

        .btn-sm {
            padding: 6px 14px;
            font-size: 12px;
        }

        /* ===== STATS BAR ===== */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            padding: 10px 16px;
            background: rgba(255,255,255,0.02);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.04);
            font-size: 12px;
            color: #666;
            margin-top: 16px;
        }

        .stats-bar .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stats-bar .stat-item i {
            color: #444;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1200px) {
            .games-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .games-grid {
                grid-template-columns: 1fr;
            }
            .header {
                flex-direction: column;
                text-align: center;
            }
            .header .right-section {
                justify-content: center;
            }
            .loginBox {
                width: 92%;
                padding: 30px 20px;
            }
        }

        @media (max-width: 480px) {
            .game-card .game-number {
                width: 32px;
                height: 32px;
                font-size: 14px;
            }
            .console-log {
                font-size: 10px;
                max-height: 150px;
            }
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .game-card {
            animation: fadeInUp 0.4s ease forwards;
        }

        .game-card:nth-child(2) { animation-delay: 0.1s; }
        .game-card:nth-child(3) { animation-delay: 0.2s; }
        .game-card:nth-child(4) { animation-delay: 0.3s; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }
        ::-webkit-scrollbar-thumb { background: rgba(0,255,255,0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0,255,255,0.3); }
    </style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="loginScreen">
    <div class="loginBox">
        <div class="logo">🎯</div>
        <h1>PREDICTOR PRO</h1>
        <p class="subtitle">WinGo Multi-Game Platform</p>
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="Enter Password" autocomplete="current-password">
        </div>
        <button onclick="login()"><i class="fas fa-sign-in-alt"></i> Login</button>
        <div id="loginMsg"></div>
    </div>
</div>

<!-- ===== MAIN ===== -->
<div id="mainPage">
    
    <!-- HEADER -->
    <header class="header">
        <div class="brand">
            <i class="fas fa-chart-line"></i>
            <h1>PREDICTOR PRO</h1>
        </div>
        <div class="right-section">
            <div id="connectionStatus" class="offline">
                <span class="dot"></span>
                <span id="statusText">Connecting...</span>
            </div>
            <span id="userEmail" style="color:#666;font-size:13px;">User</span>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </header>

    <!-- GAME CARDS -->
    <div class="games-grid" id="gamesGrid">
        <!-- Will be populated by JavaScript -->
    </div>

    <!-- CONTROLS -->
    <div class="controls-row">
        <label class="toggle">
            <input type="checkbox" id="beepToggle" checked>
            <i class="fas fa-volume-up"></i> Sound
        </label>
        <label class="toggle">
            <input type="checkbox" id="autoRefreshToggle" checked>
            <i class="fas fa-sync"></i> Auto Refresh
        </label>
        <button class="btn btn-primary btn-sm" onclick="manualFetchAll()">
            <i class="fas fa-redo"></i> Refresh All
        </button>
    </div>
    <audio id="beepSound" src="https://www.soundjay.com/buttons/sounds/beep-01a.mp3" preload="auto"></audio>

    <!-- CONSOLE LOG -->
    <div class="console-log" id="consoleLog">
        <div class="log-entry">
            <span class="log-time">[System]</span>
            <span class="log-info">🚀 All games ready...</span>
        </div>
    </div>

    <!-- STATS BAR -->
    <div class="stats-bar">
        <span class="stat-item"><i class="fas fa-database"></i> <span id="totalSaves">Total Saves: 0</span></span>
        <span class="stat-item"><i class="fas fa-clock"></i> <span id="lastUpdateAll">Last update: --</span></span>
        <span class="stat-item"><i class="fas fa-gamepad"></i> <span id="activeGames">Active: 4/4</span></span>
        <span class="stat-item"><i class="fas fa-check-circle"></i> <span id="saveStatusAll">All running</span></span>
    </div>
</div>

<script>
// ============================================
// SUPABASE CONFIG
// ============================================
const SUPABASE_URL = "https://idaezmgyjvcetagcdtpl.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlkYWV6bWd5anZjZXRhZ2NkdHBsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2MTA0MDIsImV4cCI6MjEwMDE4NjQwMn0.IFWACNDgnNoMNJaDut12uWfEIFtMo9pTX7Jdnn8p02k";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ============================================
// GAME CONFIGURATIONS
// ============================================
const GAMES = {
    wingo30: {
        id: 'wingo30',
        name: 'WinGo 30s',
        short: '30s',
        api: 'https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json',
        table: 'wingo30_predictions',
        timer: 30,
        color: '#4fc3f7',
        status: 'running'
    },
    wingo1: {
        id: 'wingo1',
        name: 'WinGo 1m',
        short: '1m',
        api: 'https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json',
        table: 'wingo1_predictions',
        timer: 60,
        color: '#69db7c',
        status: 'running'
    },
    wingo3: {
        id: 'wingo3',
        name: 'WinGo 3m',
        short: '3m',
        api: 'https://draw.ar-lottery01.com/WinGo/WinGo_3M/GetHistoryIssuePage.json',
        table: 'wingo3_predictions',
        timer: 180,
        color: '#ffd700',
        status: 'running'
    },
    wingo5: {
        id: 'wingo5',
        name: 'WinGo 5m',
        short: '5m',
        api: 'https://draw.ar-lottery01.com/WinGo/WinGo_5M/GetHistoryIssuePage.json',
        table: 'wingo5_predictions',
        timer: 300,
        color: '#ff6b6b',
        status: 'running'
    }
};

// ============================================
// STATE
// ============================================
let gameStates = {};
let allIntervals = {};
let totalSaves = 0;
let isLoggedIn = false;

// ============================================
// DOM REFS
// ============================================
const $ = id => document.getElementById(id);
const loginScreen = $('loginScreen');
const mainPage = $('mainPage');
const passwordInput = $('password');
const loginMsg = $('loginMsg');
const consoleLog = $('consoleLog');
const gamesGrid = $('gamesGrid');
const totalSavesEl = $('totalSaves');
const lastUpdateAll = $('lastUpdateAll');
const activeGames = $('activeGames');
const saveStatusAll = $('saveStatusAll');
const connectionStatus = $('connectionStatus');
const statusText = $('statusText');
const userEmail = $('userEmail');
const beepToggle = $('beepToggle');
const autoRefreshToggle = $('autoRefreshToggle');
const beepSound = $('beepSound');

// ============================================
// CONSOLE LOG
// ============================================
function addLog(message, game = 'System', type = 'info') {
    const time = new Date().toLocaleTimeString();
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    
    let gameClass = '';
    if (game === 'WinGo 30s') gameClass = 'wingo30';
    else if (game === 'WinGo 1m') gameClass = 'wingo1';
    else if (game === 'WinGo 3m') gameClass = 'wingo3';
    else if (game === 'WinGo 5m') gameClass = 'wingo5';
    
    entry.innerHTML = `
        <span class="log-time">[${time}]</span>
        <span class="log-game ${gameClass}">${game}</span>
        <span class="log-${type}">${message}</span>
    `;
    consoleLog.appendChild(entry);
    consoleLog.scrollTop = consoleLog.scrollHeight;
    
    // Also log to browser console
    console.log(`[${game}]`, message);
}

// ============================================
// NUMBER COLOR
// ============================================
function getNumberClass(num) {
    const n = parseInt(num);
    if (n === 0 || n === 5) return 'num-0';
    if ([1, 3, 7, 9].includes(n)) return 'num-1';
    if ([2, 4, 6, 8].includes(n)) return 'num-2';
    return '';
}

// ============================================
// LOGIN
// ============================================
async function login() {
    const password = passwordInput.value.trim();
    if (!password) {
        loginMsg.innerHTML = '⚠️ Please enter password';
        loginMsg.style.color = '#ffcc00';
        return;
    }

    loginMsg.innerHTML = '⏳ Authenticating...';
    loginMsg.style.color = '#ffcc00';

    try {
        const { data, error } = await supabase
            .from('users')
            .select('*')
            .eq('password', password)
            .maybeSingle();

        if (error || !data) {
            loginMsg.innerHTML = '❌ Invalid password';
            loginMsg.style.color = '#ff6b6b';
            return;
        }

        userEmail.textContent = data.username || 'User';
        loginMsg.innerHTML = '✅ Welcome ' + (data.username || 'User') + '!';
        loginMsg.style.color = '#69db7c';
        isLoggedIn = true;

        setTimeout(() => {
            loginScreen.style.display = 'none';
            mainPage.style.display = 'block';
            initApp();
        }, 400);

    } catch (err) {
        loginMsg.innerHTML = '❌ Connection error';
        loginMsg.style.color = '#ff6b6b';
    }
}

document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && loginScreen.style.display !== 'none') {
        login();
    }
});

// ============================================
// LOGOUT
// ============================================
async function logout() {
    // Clear all intervals
    Object.values(allIntervals).forEach(interval => {
        if (interval.fetch) clearInterval(interval.fetch);
        if (interval.timer) clearInterval(interval.timer);
    });
    location.reload();
}

// ============================================
// INIT - START ALL GAMES
// ============================================
function initApp() {
    // Initialize game states
    Object.keys(GAMES).forEach(key => {
        gameStates[key] = {
            lastPeriod: '',
            liveResults: [],
            isFetching: false,
            sequence: '',
            prediction: '',
            saveCount: 0,
            lastSaved: ''
        };
    });

    // Create game cards
    createGameCards();
    
    // Start all games
    startAllGames();
    
    // Update connection status
    setConnection(true);
    
    addLog('🚀 All games started successfully!', 'System', 'success');
    addLog('📊 4 games running simultaneously', 'System', 'info');
}

// ============================================
// CREATE GAME CARDS
// ============================================
function createGameCards() {
    gamesGrid.innerHTML = '';
    
    Object.keys(GAMES).forEach(key => {
        const game = GAMES[key];
        const card = document.createElement('div');
        card.className = 'game-card';
        card.id = `card_${key}`;
        card.innerHTML = `
            <div class="game-header">
                <span class="game-name" style="color:${game.color}">${game.name}</span>
                <span class="game-status running" id="status_${key}">● Running</span>
            </div>
            <div class="game-timer" id="timer_${key}" style="color:${game.color}">--</div>
            <div class="game-period" id="period_${key}">Period: ------</div>
            <div class="game-numbers" id="numbers_${key}">
                <span style="color:#444;">Waiting for data...</span>
            </div>
            <div class="game-footer">
                <span>Sequence: <span id="seq_${key}" style="color:#888;">------</span></span>

// ============================================
// START ALL GAMES
// ============================================
function startAllGames() {
    Object.keys(GAMES).forEach(key => {
        // Start timer
        startTimer(key);
        
        // Start fetching
        fetchGameData(key);
        
        // Set interval for fetching
        allIntervals[key] = {
            fetch: setInterval(() => {
                if (autoRefreshToggle.checked) {
                    fetchGameData(key);
                }
            }, 5000),
            timer: null
        };
    });
}

// ============================================
// START TIMER
// ============================================
function startTimer(gameKey) {
    const game = GAMES[gameKey];
    const timerEl = document.getElementById(`timer_${gameKey}`);
    
    function updateTimer() {
        const now = new Date();
        const sec = now.getSeconds();
        const totalSec = game.timer;
        const remain = totalSec - (sec % totalSec);
        const display = remain === totalSec ? 0 : remain;
        
        if (game.timer > 60) {
            const mins = Math.floor(display / 60);
            const secs = display % 60;
            timerEl.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
        } else {
            timerEl.textContent = display.toString().padStart(2, '0') + 's';
        }
        
        // Color coding
        timerEl.className = 'game-timer';
        if (display <= 5) {
            timerEl.classList.add('danger');
        } else if (display <= 10) {
            timerEl.classList.add('warning');
        }
    }
    
    updateTimer();
    allIntervals[gameKey].timer = setInterval(updateTimer, 1000);
}

// ============================================
// FETCH GAME DATA
// ============================================
async function fetchGameData(gameKey) {
    const game = GAMES[gameKey];
    const state = gameStates[gameKey];
    
    if (state.isFetching) return;
    state.isFetching = true;

    try {
        const response = await fetch(game.api + '?ts=' + Date.now(), {
            headers: { 'Cache-Control': 'no-cache' }
        });
        
        const json = await response.json();

        if (!json.data || !json.data.list) {
            state.isFetching = false;
            return;
        }

        const results = json.data.list.map(item => ({
            period: String(item.issueNumber || ''),
            digit: Number(item.number || 0),
            bigSmall: Number(item.number || 0) >= 5 ? 'Big' : 'Small'
        })).filter(r => r.period);

        if (results.length === 0) {
            state.isFetching = false;
            return;
        }

        const latest = results.slice(0, 10);

        // Check if new period
        if (latest.length && latest[0].period !== state.lastPeriod) {
            state.lastPeriod = latest[0].period;
            state.liveResults = latest;
            
            // Update UI
            document.getElementById(`period_${gameKey}`).textContent = `Period: ${latest[0].period}`;
            
            // Update numbers
            updateGameNumbers(gameKey, latest);
            
            // Save prediction
            if (results.length >= 6) {
                await savePrediction(gameKey, results);
            }
        }

        // Update status
        document.getElementById(`status_${gameKey}`).textContent = '● Running';
        document.getElementById(`status_${gameKey}`).className = 'game-status running';

    } catch (err) {
        console.error(`Error fetching ${game.name}:`, err);
        document.getElementById(`status_${gameKey}`).textContent = '⚠️ Error';
        document.getElementById(`status_${gameKey}`).className = 'game-status saving';
    }

    state.isFetching = false;
}

// ============================================
// UPDATE GAME NUMBERS
// ============================================
function updateGameNumbers(gameKey, results) {
    const numbersEl = document.getElementById(`numbers_${gameKey}`);
    
    if (!results || results.length === 0) {
        numbersEl.innerHTML = '<span style="color:#444;">No data</span>';
        return;
    }
    
    const latest = results.slice(0, 3);
    numbersEl.innerHTML = latest.map(item => {
        const numClass = getNumberClass(item.digit);
        return `<span class="game-number ${numClass}">${item.digit}</span>`;
    }).join('');
}

// ============================================
// SAVE PREDICTION - ONE TIME PER PERIOD
// ============================================
async function savePrediction(gameKey, results) {
    const game = GAMES[gameKey];
    const state = gameStates[gameKey];
    
    if (results.length < 6) return;
    
    const sequence = results.slice(1, 6).map(r => r.digit).join('');
    const nextDigit = results[0].digit;
    const saveKey = `${gameKey}_${sequence}`;
    
    // Check if already saved this period
    if (state.lastSaved === sequence) {
        return;
    }
    
    try {
        // Check if sequence exists
        const { data, error } = await supabase
            .from(game.table)
            .select('next_numbers')
            .eq('sequence', sequence)
            .maybeSingle();
            
        if (error) {
            console.error(`Save error [${game.name}]:`, error);
            return;
        }
        
        if (data) {
            // Update existing
            let arr = data.next_numbers.split(',');
            if (!arr.includes(String(nextDigit))) {
                arr.push(String(nextDigit));
                await supabase
                    .from(game.table)
                    .update({ next_numbers: arr.join(',') })
                    .eq('sequence', sequence);
                    
                state.lastSaved = sequence;
                state.saveCount++;
                totalSaves++;
                
                // Log
                addLog(`✅ UPDATED: ${sequence} -> ${arr.join(',')}`, game.name, 'success');
                updateSaveStatus(gameKey, `✓ Saved (${arr.join(',')})`);
            }
        } else {
            // Insert new
            await supabase
                .from(game.table)
                .insert([{ sequence, next_numbers: String(nextDigit) }]);
                
            state.lastSaved = sequence;
            state.saveCount++;
            totalSaves++;
            
            // Log
            addLog(`✅ NEW: ${sequence} -> ${nextDigit}`, game.name, 'success');
            updateSaveStatus(gameKey, `✓ Saved (${nextDigit})`);
        }
        
        // Update sequence display
        document.getElementById(`seq_${gameKey}`).textContent = sequence;
        
        // Update totals
        totalSavesEl.textContent = `Total Saves: ${totalSaves}`;
        
        // Beep
        if (beepToggle.checked) {
            try {
                beepSound.currentTime = 0;
                await beepSound.play();
                setTimeout(() => { try { beepSound.pause(); } catch(e) {} }, 1000);
            } catch (e) {}
        }
        
    } catch (err) {
        console.error(`Save error [${game.name}]:`, err);
        updateSaveStatus(gameKey, '❌ Error');
    }
}

// ============================================
// UPDATE SAVE STATUS
// ============================================
function updateSaveStatus(gameKey, status) {
    const el = document.getElementById(`savestatus_${gameKey}`);
    el.textContent = status;
    if (status.includes('Saved')) {
        el.className = 'save-status';
    } else if (status.includes('Error')) {
        el.className = 'save-status saving';
    }
}

// ============================================
// MANUAL FETCH ALL
// ============================================
function manualFetchAll() {
    addLog('🔄 Manual refresh all games', 'System', 'info');
    Object.keys(GAMES).forEach(key => {
        fetchGameData(key);
    });
}

// CONNECTION STATUS

        connectionStatus.className = 'online';
        statusText.textContent = 'Connected';
    } else {
        connectionStatus.className = 'offline';
        statusText.textContent = 'Disconnected';

}

    });
});
